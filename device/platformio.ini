; PlatformIO project for Push-to-Claude on the M5Stack Core2.
; Build with: pio run
; Flash with: pio run -t upload
; Serial:     pio device monitor

[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino

monitor_speed = 115200
upload_speed = 1500000

; Core2 has 8 MB PSRAM; we use it for the audio buffer.
; partition.csv with larger app slot in case we grow.
board_build.partitions = default_16MB.csv
board_build.f_flash = 80000000L

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.1.0
